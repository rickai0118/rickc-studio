# Provider 接入模板
# 复制此目录，修改以下字段即可接入新模型

name: my-model                      # 显示名称
model: my-model-id                  # 模型 ID
provider: my-platform               # 平台标识

endpoint:
  base: https://api.example.com     # 基础 URL
  # sync 模式:
  generate: /v1/chat/completions    # 提交端点
  # async 模式:
  # submit: /v1/submit/music         # 提交端点
  # fetch:  /v1/fetch/{task_id}      # 轮询端点

auth:
  type: bearer                      # bearer | api-key-header | api-key-query
  env_var: MYPROVIDER_API_KEY       # 环境变量名 (兼容 env_key)

task:
  mode: sync                        # sync | async

# 默认参数 (可被 --params 覆写)
defaults:
  bpm: 120
  key: "C major"
  duration: 240
  format: mp3

# 提示结构 (sync 模式)
prompt:
  tags_required: false              # ACE 为 true

# async 模式参数
params:
  gpt_description_prompt:
    type: string
    required: true
  make_instrumental:
    type: bool
    default: false
